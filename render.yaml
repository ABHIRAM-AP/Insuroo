services:
  - type: web
    name: insuroo-backend
    runtime: docker
    plan: free # Change to 'starter' if you need more resources
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SARVAM_AI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 8000
    disk:
      name: insuroo-data
      mountPath: /app/data
      sizeGB: 1 # Minimum size
